spring:
  application:
    name: api-gateway
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  cloud:
    gateway:
      routes:
        - id: account-service
          uri: ${ACCOUNT_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/v1/accounts/**
          filters:
            - CircuitBreaker=accountCircuitBreaker
        - id: transaction-service
          uri: ${TRANSACTION_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/v1/transactions/**
          filters:
            - CircuitBreaker=transactionCircuitBreaker

server:
  port: ${SERVER_PORT:8080}

security:
  jwt:
    secret: ${JWT_SECRET:change-me-change-me-change-me-change-me-1234567890}
    issuer: ${JWT_ISSUER:payment-platform-gateway}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:60}
  users:
    - username: admin
      password: ${ADMIN_PASSWORD:admin123}
      roles:
        - ADMIN
        - OPS
    - username: ops
      password: ${OPS_PASSWORD:ops123}
      roles:
        - OPS
    - username: fraud-engine
      password: ${FRAUD_PASSWORD:fraud123}
      roles:
        - FRAUD_ENGINE
    - username: customer
      password: ${CUSTOMER_PASSWORD:customer123}
      roles:
        - CUSTOMER
    - username: customer@example.com
      password: ${CUSTOMER_EMAIL_PASSWORD:customer123}
      roles:
        - CUSTOMER

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

resilience4j:
  circuitbreaker:
    instances:
      accountCircuitBreaker:
        slidingWindowSize: 10
        failureRateThreshold: 50
      transactionCircuitBreaker:
        slidingWindowSize: 10
        failureRateThreshold: 50
