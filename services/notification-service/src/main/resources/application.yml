spring:
  application:
    name: notification-service
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP:notification-service}
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.paymentplatform.notification.domain
        spring.json.use.type.headers: false
        spring.json.value.default.type: com.paymentplatform.notification.domain.TransactionEvent

server:
  port: ${SERVER_PORT:8083}

clients:
  account-service:
    base-url: ${ACCOUNT_SERVICE_BASE_URL:http://localhost:8081}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
